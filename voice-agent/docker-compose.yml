version: "3.9"

services:
  # ─── LiveKit Server ─────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    restart: unless-stopped
    ports:
      - "7880:7880" # HTTP API
      - "7881:7881" # RTC (WebSocket)
      - "7882:7882" # TURN/TLS
      - "50000-50200:50000-50200/udp" # WebRTC media (UDP)
    volumes:
      - ./livekit.yaml:/livekit.yaml
    env_file:
      - .env
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: --config /livekit.yaml --node-ip=${HOST_IP:-0.0.0.0}
    networks:
      - voice-net

  # ─── LiveKit SIP Bridge ─────────────────────────────
  # Routes SIP (Vobiz) calls into LiveKit rooms
  sip:
    image: livekit/sip:latest
    container_name: livekit-sip
    restart: unless-stopped
    depends_on:
      - livekit
      - redis
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    volumes:
      - ./sip.yaml:/sip.yaml
    command: --config /sip.yaml
    ports:
      - "5060:5060/udp" # SIP signaling
      - "5060:5060/tcp" # SIP signaling (TCP)
      - "10000-10200:10000-10200/udp" # RTP Media (Audio)
    networks:
      - voice-net

  # ─── Redis (LiveKit dependency) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: voice-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - voice-net

  # ─── Voice Agent (Python — main pipeline) ────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-agent
    restart: unless-stopped
    depends_on:
      - livekit
      - sip
      - redis
    env_file:
      - .env
    volumes:
      - ./system_prompt.md:/app/system_prompt.md:ro
    command: python agent.py dev
    networks:
      - voice-net

  # ─── Outbound Call API (FastAPI) ─────────────────────
  # N8N calls POST /api/call here to trigger outbound calls
  outbound-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-outbound
    restart: unless-stopped
    depends_on:
      - livekit
      - sip
    env_file:
      - .env
    ports:
      - "${OUTBOUND_PORT:-8089}:8089"
    command: python outbound.py
    networks:
      - voice-net

networks:
  voice-net:
    driver: bridge
